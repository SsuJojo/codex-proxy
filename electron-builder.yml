appId: com.codex-proxy.app
productName: Codex Proxy

directories:
  output: release

files:
  - dist-electron/**/*
  - dist/**/*
  - public/**/*
  - public-desktop/**/*
  - config/**/*
  - electron/assets/**/*
  - node_modules/**/*
  - package.json
  - "!node_modules/@electron/**"
  - "!node_modules/electron/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/esbuild/**"

# ESM backend files unpacked from asar (avoids ESM+asar compatibility issues)
asarUnpack:
  - "dist/**/*"
  - "public/**/*"
  - "public-desktop/**/*"
  - "config/**/*"
  - "**/*.node"

# curl-impersonate binaries as extra resources (outside asar)
extraResources:
  - from: bin/
    to: bin/
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: electron/assets/icon.png
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  icon: electron/assets/icon.png
  category: public.app-category.developer-tools
  # No Apple Developer certificate — electron-builder auto-falls back to
  # ad-hoc signing (codesign -s -). Users see "unidentified developer"
  # warning and can right-click → Open to bypass.

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: electron/assets/icon.png
  category: Development
