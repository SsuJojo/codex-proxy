name: Web Smoke Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build web + backend
        run: npm run build

      - name: Run Web Smoke Test
        run: npm test -- src/__tests__/web-smoke.test.ts
