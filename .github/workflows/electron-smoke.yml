name: Electron Smoke Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Install desktop frontend dependencies
        run: cd packages/electron/desktop && pnpm install

      - name: Setup curl-impersonate
        run: pnpm run setup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web frontend
        run: pnpm run build:web

      - name: Build backend
        run: npx tsc

      - name: Build desktop frontend
        run: cd packages/electron/desktop && npx vite build

      - name: Build Electron app
        run: cd packages/electron && pnpm run build

      - name: Package Electron app
        run: |
          cd packages/electron
          npx electron-builder --config electron-builder.yml --linux dir

      - name: Test App Launch
        run: |
          # Locate the built executable
          BINARY_PATH=$(find packages/electron/release -name "codex-proxy" -type f -executable | head -n 1)
          if [ -z "$BINARY_PATH" ]; then
            echo "Failed to find built codex-proxy executable"
            exit 1
          fi

          echo "Found binary at: $BINARY_PATH"

          # Install xvfb to run headless
          sudo apt-get update && sudo apt-get install -y xvfb

          # Run the app in the background and pipe output to a file
          xvfb-run --auto-servernum "$BINARY_PATH" --no-sandbox > app-output.log 2>&1 &
          APP_PID=$!

          echo "App started with PID $APP_PID"

          # Wait a few seconds to let it initialize
          sleep 5

          # Check if the process is still running
          if ps -p $APP_PID > /dev/null; then
             echo "App launched successfully and is running."
             # Output logs
             cat app-output.log

             # Kill the app
             kill $APP_PID
             sleep 2
             if ps -p $APP_PID > /dev/null; then
                 kill -9 $APP_PID
             fi
             echo "App exited cleanly."
          else
             echo "App crashed after launch. Logs:"
             cat app-output.log
             exit 1
          fi
